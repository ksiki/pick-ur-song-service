services:
  # ---------------------------------------------
  # Базы данных и брокеры
  # ---------------------------------------------
  db:
    image: postgres:17-alpine
    container_name: pus_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pus_pass}
      POSTGRES_DB: ${POSTGRES_DB:-pus_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pus_user} -d ${POSTGRES_DB:-pus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pus_network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pus_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "15672:15672" # Management UI для удобного дебага
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pus_network

  redis:
    image: redis:7-alpine
    container_name: pus_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pus_network

  # ---------------------------------------------
  # Backend-сервисы
  # ---------------------------------------------
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pus_api
    restart: unless-stopped
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    command: ./start.sh
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-pus_user}:${POSTGRES_PASSWORD:-pus_pass}@db:5432/${POSTGRES_DB:-pus_db}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pus_network

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pus_worker
    restart: unless-stopped
    command: taskiq worker app.broker.config:broker app.modules.music.tasks --reload
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-pus_user}:${POSTGRES_PASSWORD:-pus_pass}@db:5432/${POSTGRES_DB:-pus_db}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      api:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pus_network

  # ---------------------------------------------
  # Web Server (Nginx)
  # ---------------------------------------------
  nginx:
    image: nginx:stable-alpine
    container_name: pus_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist:/usr/share/nginx/html:ro # Сюда билдится SPA
    depends_on:
      - api
    networks:
      - pus_network

networks:
  pus_network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
